name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 08:00 UTC to catch newly published advisories
    - cron: '0 8 * * 1'

jobs:
  audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      # SC-099 — audit all dependencies against the RustSec advisory database
      - name: Run cargo audit
        run: cargo audit --manifest-path apexchainx_calculator/Cargo.toml

      # Surface the dependency tree so maintainers can spot unexpected additions
      - name: Show dependency tree
        run: cargo tree --manifest-path apexchainx_calculator/Cargo.toml --depth 2
